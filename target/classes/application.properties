spring.application.name=MovoBackend

# --- CONFIGURACIï¿½N DEL SERVIDOR ---
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# --- CONFIGURACIï¿½N DE LA BASE DE DATOS (POSTGRESQL) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/movodb
spring.datasource.username=movo
spring.datasource.password=movopassword
spring.datasource.driver-class-name=org.postgresql.Driver

# --- CONFIGURACIï¿½N DE JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true